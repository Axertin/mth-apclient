name: release

on:
  push:
    tags: ['v*']

env:
  VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-cache,readwrite"

jobs:
  guard:
    name: Check tag is on master
    runs-on: ubuntu-24.04
    outputs:
      on_master: ${{ steps.check.outputs.on_master }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Is the tagged commit on master?
        id: check
        run: |
          git fetch --no-tags origin master:refs/remotes/origin/master
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/master; then
            echo "on_master=true" >> "$GITHUB_OUTPUT"
          else
            echo "on_master=false" >> "$GITHUB_OUTPUT"
            echo "::notice::tag $GITHUB_REF_NAME ($GITHUB_SHA) is not on master; skipping release"
          fi

  build-linux:
    name: Build mod (Linux x86_64, Frida)
    needs: guard
    if: needs.guard.outputs.on_master == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive, fetch-depth: 0 }
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y clang ninja-build
      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: .vcpkg-cache
          key: vcpkg-linux-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-${{ github.run_id }}
          restore-keys: |
            vcpkg-linux-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-
      - name: Bootstrap vcpkg
        run: ./external/vcpkg/bootstrap-vcpkg.sh -disableMetrics
      - name: Configure
        run: cmake --preset clang-x64-release
      - name: Build
        run: cmake --build --preset clang-x64-release
      - name: Upload libmthap.so
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: build/clang-x64-release/src/mth/libmthap.so
          if-no-files-found: error

  build-windows:
    name: Build mod (Windows clang-cl x64)
    needs: guard
    if: needs.guard.outputs.on_master == 'true'
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive, fetch-depth: 0 }
      - name: Set up MSVC environment (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64
      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: .vcpkg-cache
          key: vcpkg-winclangcl-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-${{ github.run_id }}
          restore-keys: |
            vcpkg-winclangcl-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-
      - name: Bootstrap vcpkg
        shell: cmd
        run: external\vcpkg\bootstrap-vcpkg.bat -disableMetrics
      - name: Configure
        run: cmake --preset clang-cl-x64-release
      - name: Build
        run: cmake --build --preset clang-cl-x64-release
      - name: Upload version.dll
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: build/clang-cl-x64-release/src/mth/version.dll
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      # Pre-release for any prerelease tag suffix (-dev/-beta/-rc/...) or a 0.x major.
      - name: Classify tag
        id: tag
        run: |
          ver="${GITHUB_REF_NAME#v}"
          if [[ "$ver" == *-* || "$ver" == 0.* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }} # this job has no checkout; tell gh the repo
        run: |
          args=(--title "$GITHUB_REF_NAME" --generate-notes)
          if [[ "${{ steps.tag.outputs.prerelease }}" == "true" ]]; then args+=(--prerelease); fi
          gh release create "$GITHUB_REF_NAME" dist/libmthap.so dist/version.dll "${args[@]}"
