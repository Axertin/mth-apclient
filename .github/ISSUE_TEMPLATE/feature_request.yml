name: Feature / enhancement request
description: Suggest a new feature or an improvement to an existing one
labels: ["enhancement"]
body:
  - type: textarea
    id: request
    attributes:
      label: What would you like?
      description: Describe the feature or enhancement and why it would be useful.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — examples, alternatives you considered, related issues.
    validations:
      required: false
